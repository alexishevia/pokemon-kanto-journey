<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokemon Kanto Journey Builder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>My Journey Through Kanto</h1>
  <div class="app">
    <div class="input-panel" id="input-panel"></div>
    <div class="preview-panel">
      <h2>Preview (right-click to save)</h2>
      <canvas id="journey-canvas"></canvas>
      <br>
      <button class="download-btn" id="download-btn">Download as PNG</button>
    </div>
  </div>

  <script src="pokemon-data.js"></script>
  <script src="milestones.js"></script>
  <script src="canvas-renderer.js"></script>
  <script src="app.js"></script>
</body>
</html>
